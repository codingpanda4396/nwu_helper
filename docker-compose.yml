services:
  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: nwu
      POSTGRES_PASSWORD: nwu_password
      POSTGRES_DB: nwu_helper
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nwu -d nwu_helper"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      target: api
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "4000:4000"

  admin:
    build:
      context: .
      target: admin
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - "8080:80"

  student:
    build:
      context: .
      target: student
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - "8081:80"

volumes:
  postgres_data:

name: Fix migration

on:
  workflow_dispatch:

jobs:
  fix:
    name: Resolve migration
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Run migrate resolve
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.ECS_HOST }}
          username: ${{ secrets.ECS_USER }}
          key: ${{ secrets.ECS_SSH_KEY }}
          port: ${{ secrets.ECS_SSH_PORT || '22' }}
          command_timeout: 10m
          script: |
            set -eu
            APP_DIR="${{ secrets.ECS_APP_DIR || '/opt/nwu_helper' }}"
            if [ ! -d "$APP_DIR/current" ] && [ -d /opt/nwu_helper/current ]; then
              APP_DIR="/opt/nwu_helper"
            fi
            cd "$APP_DIR/current"
            docker compose -f docker-compose.prod.yml --env-file .env exec -T api npx prisma migrate resolve --applied 20260528000000_add_new_models || true
            docker compose -f docker-compose.prod.yml --env-file .env exec -T api pnpm db:migrate
            docker compose -f docker-compose.prod.yml --env-file .env exec -T api pnpm db:seed || true
            docker compose -f docker-compose.prod.yml --env-file .env restart api

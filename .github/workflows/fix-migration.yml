name: Fix migration

on:
  workflow_dispatch:

jobs:
  fix:
    name: Resolve migration
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Run migrate resolve
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.ECS_HOST }}
          username: ${{ secrets.ECS_USER }}
          key: ${{ secrets.ECS_SSH_KEY }}
          port: ${{ secrets.ECS_SSH_PORT || '22' }}
          command_timeout: 15m
          script: |
            set -eu
            APP_DIR="${{ secrets.ECS_APP_DIR || '/opt/nwu_helper' }}"
            if [ ! -d "$APP_DIR/current" ] && [ -d /opt/nwu_helper/current ]; then
              APP_DIR="/opt/nwu_helper"
            fi
            cd "$APP_DIR/current"
            
            # Start all containers
            docker compose -f docker-compose.prod.yml --env-file .env up -d --remove-orphans 2>&1 || true
            
            # Wait for postgres to be healthy
            echo "Waiting for postgres..."
            for i in $(seq 1 30); do
              if docker compose -f docker-compose.prod.yml --env-file .env ps postgres 2>/dev/null | grep -q "healthy"; then
                echo "Postgres is healthy"
                break
              fi
              echo "Waiting for postgres... attempt $i"
              sleep 3
            done
            
            # Wait for API to be running
            echo "Waiting for API..."
            for i in $(seq 1 30); do
              if docker compose -f docker-compose.prod.yml --env-file .env ps api 2>/dev/null | grep -q "Up"; then
                echo "API is up"
                break
              fi
              echo "Waiting for API... attempt $i"
              sleep 3
            done
            
            # Resolve the failed migration
            echo "Resolving migration..."
            docker compose -f docker-compose.prod.yml --env-file .env exec -T api npx prisma migrate resolve --applied 20260528000000_add_new_models 2>&1 || echo "Migration resolve skipped"
            
            # Run pending migrations
            echo "Running migrations..."
            docker compose -f docker-compose.prod.yml --env-file .env exec -T api pnpm db:migrate 2>&1
            
            # Seed data
            echo "Seeding data..."
            docker compose -f docker-compose.prod.yml --env-file .env exec -T api pnpm db:seed 2>&1 || echo "Seed skipped"
            
            # Restart API to apply changes
            echo "Restarting API..."
            docker compose -f docker-compose.prod.yml --env-file .env restart api
            
            # Final health check
            echo "Health check..."
            sleep 5
            if docker compose -f docker-compose.prod.yml --env-file .env ps api 2>/dev/null | grep -q "Up"; then
              echo "API is running"
            else
              echo "API failed to start"
              docker compose -f docker-compose.prod.yml --env-file .env logs --tail=20 api
              exit 1
            fi
            
            echo "Done!"

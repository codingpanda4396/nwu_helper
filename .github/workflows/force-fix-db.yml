name: Force fix database

on:
  workflow_dispatch:

jobs:
  fix:
    name: Force fix database
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Fix database and restart
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.ECS_HOST }}
          username: ${{ secrets.ECS_USER }}
          key: ${{ secrets.ECS_SSH_KEY }}
          port: ${{ secrets.ECS_SSH_PORT || '22' }}
          command_timeout: 20m
          script: |
            set -x
            APP_DIR="${{ secrets.ECS_APP_DIR || '/opt/nwu_helper' }}"
            cd "$APP_DIR/current"
            
            echo "=== Step 1: Stop API container ==="
            docker compose -f docker-compose.prod.yml --env-file .env stop api 2>&1 || true
            sleep 2
            
            echo "=== Step 2: Check postgres status ==="
            docker compose -f docker-compose.prod.yml --env-file .env ps postgres 2>&1 || true
            
            echo "=== Step 3: Start postgres if not running ==="
            docker compose -f docker-compose.prod.yml --env-file .env up -d postgres 2>&1 || true
            sleep 10
            
            echo "=== Step 4: Wait for postgres ==="
            for i in $(seq 1 20); do
              if docker exec current-postgres-1 pg_isready -U nwu -d nwu_helper 2>/dev/null; then
                echo "Postgres is ready"
                break
              fi
              echo "Waiting... attempt $i"
              sleep 3
            done
            
            echo "=== Step 5: Resolve failed migration directly in postgres ==="
            docker exec current-postgres-1 psql -U nwu -d nwu_helper -c "
              INSERT INTO \"_prisma_migrations\" (id, checksum, migration_name, started_at, finished_at, applied_steps_count)
              VALUES (
                '20260528000000_add_new_models',
                'manual-resolve',
                '20260528000000_add_new_models',
                NOW(),
                NOW(),
                1
              )
              ON CONFLICT (id) DO UPDATE SET finished_at = NOW(), applied_steps_count = 1;
            " 2>&1 || echo "Migration record might already exist"
            
            echo "=== Step 6: Check migration status ==="
            docker exec current-postgres-1 psql -U nwu -d nwu_helper -c "SELECT id, migration_name, finished_at FROM \"_prisma_migrations\" ORDER BY started_at DESC LIMIT 5;" 2>&1
            
            echo "=== Step 7: Create missing tables if needed ==="
            docker exec current-postgres-1 psql -U nwu -d nwu_helper -c "
              CREATE TABLE IF NOT EXISTS \"MerchantImage\" (
                id TEXT NOT NULL PRIMARY KEY,
                \"merchantId\" TEXT NOT NULL,
                \"imageUrl\" TEXT NOT NULL,
                type TEXT NOT NULL DEFAULT 'OTHER',
                \"sortOrder\" INTEGER NOT NULL DEFAULT 100,
                \"createdAt\" TIMESTAMP(3) NOT NULL DEFAULT CURRENT_TIMESTAMP
              );
              CREATE TABLE IF NOT EXISTS \"ViewHistory\" (
                id TEXT NOT NULL PRIMARY KEY,
                \"userId\" TEXT NOT NULL,
                \"merchantId\" TEXT NOT NULL,
                \"createdAt\" TIMESTAMP(3) NOT NULL DEFAULT CURRENT_TIMESTAMP
              );
              CREATE TABLE IF NOT EXISTS \"Favorite\" (
                id TEXT NOT NULL PRIMARY KEY,
                \"userId\" TEXT NOT NULL,
                \"merchantId\" TEXT NOT NULL,
                \"createdAt\" TIMESTAMP(3) NOT NULL DEFAULT CURRENT_TIMESTAMP
              );
              CREATE TABLE IF NOT EXISTS \"Feedback\" (
                id TEXT NOT NULL PRIMARY KEY,
                \"userId\" TEXT,
                content TEXT NOT NULL,
                contact TEXT,
                type TEXT NOT NULL DEFAULT 'SUGGESTION',
                status TEXT NOT NULL DEFAULT 'PENDING',
                reply TEXT,
                \"createdAt\" TIMESTAMP(3) NOT NULL DEFAULT CURRENT_TIMESTAMP,
                \"updatedAt\" TIMESTAMP(3) NOT NULL
              );
              CREATE TABLE IF NOT EXISTS \"CampusConfig\" (
                id TEXT NOT NULL DEFAULT 'default',
                name TEXT NOT NULL DEFAULT '西北大学',
                slug TEXT NOT NULL DEFAULT 'nwu',
                logo TEXT,
                address TEXT,
                \"isActive\" BOOLEAN NOT NULL DEFAULT true,
                \"createdAt\" TIMESTAMP(3) NOT NULL DEFAULT CURRENT_TIMESTAMP,
                \"updatedAt\" TIMESTAMP(3) NOT NULL
              );
            " 2>&1 || echo "Tables might already exist"
            
            echo "=== Step 8: Add missing columns to Merchant ==="
            docker exec current-postgres-1 psql -U nwu -d nwu_helper -c "
              DO \$\$ BEGIN
                ALTER TABLE \"Merchant\" ADD COLUMN IF NOT EXISTS \"avgPrice\" DOUBLE PRECISION;
              EXCEPTION WHEN duplicate_column THEN NULL;
              END \$\$;
              DO \$\$ BEGIN
                ALTER TABLE \"Merchant\" ADD COLUMN IF NOT EXISTS \"latitude\" DOUBLE PRECISION;
              EXCEPTION WHEN duplicate_column THEN NULL;
              END \$\$;
              DO \$\$ BEGIN
                ALTER TABLE \"Merchant\" ADD COLUMN IF NOT EXISTS \"longitude\" DOUBLE PRECISION;
              EXCEPTION WHEN duplicate_column THEN NULL;
              END \$\$;
              DO \$\$ BEGIN
                ALTER TABLE \"Merchant\" ADD COLUMN IF NOT EXISTS \"tags\" TEXT[] DEFAULT ARRAY[]::TEXT[];
              EXCEPTION WHEN duplicate_column THEN NULL;
              END \$\$;
            " 2>&1
            
            echo "=== Step 9: Start API container ==="
            docker compose -f docker-compose.prod.yml --env-file .env start api 2>&1
            
            echo "=== Step 10: Wait for API ==="
            sleep 10
            for i in $(seq 1 20); do
              if docker compose -f docker-compose.prod.yml --env-file .env ps api 2>/dev/null | grep -q "Up"; then
                echo "API is up"
                break
              fi
              echo "Waiting for API... attempt $i"
              sleep 3
            done
            
            echo "=== Step 11: Check API health ==="
            docker compose -f docker-compose.prod.yml --env-file .env exec -T api node -e "
              fetch('http://127.0.0.1:4000/api/health')
                .then(async r => { 
                  if (!r.ok) throw new Error(await r.text()); 
                  console.log('Health check passed:', await r.text()); 
                })
                .catch(e => { console.error('Health check failed:', e.message); process.exit(1); })
            " 2>&1 || echo "Health check failed, checking logs..."
            
            echo "=== Step 12: Seed data ==="
            docker compose -f docker-compose.prod.yml --env-file .env exec -T api pnpm db:seed 2>&1 || echo "Seed failed"
            
            echo "=== Done ==="
            docker compose -f docker-compose.prod.yml --env-file .env ps 2>&1

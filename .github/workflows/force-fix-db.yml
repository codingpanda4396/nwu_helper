name: Force fix database

on:
  workflow_dispatch:

jobs:
  fix:
    name: Force fix database
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Fix database and restart
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.ECS_HOST }}
          username: ${{ secrets.ECS_USER }}
          key: ${{ secrets.ECS_SSH_KEY }}
          port: ${{ secrets.ECS_SSH_PORT || '22' }}
          command_timeout: 20m
          script: |
            set -x
            APP_DIR="${{ secrets.ECS_APP_DIR || '/opt/nwu_helper' }}"
            cd "$APP_DIR/current"
            
            echo "=== Step 1: Check postgres logs ==="
            docker logs current-postgres-1 2>&1 | tail -30 || true
            
            echo "=== Step 2: Stop all containers ==="
            docker compose -f docker-compose.prod.yml --env-file .env down 2>&1 || true
            sleep 5
            
            echo "=== Step 3: Remove postgres volume (data will be lost) ==="
            docker volume rm current_postgres_data 2>&1 || echo "Volume not found or in use"
            
            echo "=== Step 4: Start postgres fresh ==="
            docker compose -f docker-compose.prod.yml --env-file .env up -d postgres 2>&1
            
            echo "=== Step 5: Wait for postgres ==="
            for i in $(seq 1 30); do
              if docker exec current-postgres-1 pg_isready -U nwu -d nwu_helper 2>/dev/null; then
                echo "Postgres is ready"
                break
              fi
              echo "Waiting for postgres... attempt $i"
              sleep 3
            done
            
            echo "=== Step 6: Verify postgres ==="
            docker exec current-postgres-1 psql -U nwu -d nwu_helper -c "SELECT 1 as test;" 2>&1
            
            echo "=== Step 7: Run migrations ==="
            docker compose -f docker-compose.prod.yml --env-file .env up -d api 2>&1
            sleep 5
            docker compose -f docker-compose.prod.yml --env-file .env exec -T api pnpm db:migrate 2>&1
            
            echo "=== Step 8: Seed data ==="
            docker compose -f docker-compose.prod.yml --env-file .env exec -T api pnpm db:seed 2>&1
            
            echo "=== Step 9: Start all services ==="
            docker compose -f docker-compose.prod.yml --env-file .env up -d 2>&1
            
            echo "=== Step 10: Final health check ==="
            sleep 10
            docker compose -f docker-compose.prod.yml --env-file .env ps 2>&1
            
            echo "=== Done ==="

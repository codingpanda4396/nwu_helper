name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches-ignore: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test-build:
    name: Typecheck, test, build
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: nwu
          POSTGRES_PASSWORD: nwu_password
          POSTGRES_DB: nwu_helper_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U nwu -d nwu_helper_ci"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://nwu:nwu_password@localhost:5432/nwu_helper_ci
      JWT_SECRET: ci-secret
      WEB_ORIGIN: http://localhost:5173
      PUBLIC_WEB_URL: http://localhost:5173
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.33.2

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma Client
        run: pnpm db:generate

      - name: Validate migrations
        run: pnpm db:migrate

      - name: Validate seed data
        run: pnpm db:seed

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm build

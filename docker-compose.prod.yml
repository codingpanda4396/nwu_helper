services:
  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-nwu}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-nwu_password}
      POSTGRES_DB: ${POSTGRES_DB:-nwu_helper}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER:-nwu} -d $${POSTGRES_DB:-nwu_helper} || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 512M

  api:
    image: nwu-helper-api:latest
    build:
      context: .
      target: api
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - LOG_LEVEL=warn
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "${API_BIND:-127.0.0.1:4000}:4000"
    deploy:
      resources:
        limits:
          memory: 512M
    command: ["node", "dist/src/cluster.js"]

  admin:
    image: nwu-helper-admin:latest
    build:
      context: .
      target: admin
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - "${ADMIN_BIND:-0.0.0.0:18080}:80"
    deploy:
      resources:
        limits:
          memory: 128M

  student:
    image: nwu-helper-student:latest
    build:
      context: .
      target: student
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - "${STUDENT_BIND:-0.0.0.0:8081}:80"
    deploy:
      resources:
        limits:
          memory: 128M

  gateway:
    image: nwu-helper-gateway:latest
    build:
      context: .
      target: gateway
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - "${GATEWAY_BIND:-0.0.0.0:80}:80"
    deploy:
      resources:
        limits:
          memory: 128M

volumes:
  postgres_data:
